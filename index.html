<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PdfEditor</title>

    <!-- TailwindCSS via CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- PDF.js (Mozilla) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.js">
    </script>
    <!-- Font Awesome 6 (icone) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <style>
        /* Full-height layout */
        html, body {
            height: 100%;
            overflow: hidden;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        /* Sidebar mobile transition */
        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <div id="app">
        <!-- TOP BAR -->
        <header class="bg-white border-b border-slate-200 px-4 py-2 flex items-center justify-between shrink-0 shadow-sm">
            <div class="flex items-center gap-3">
                <button id="menuToggle" class="lg:hidden p-1.5 rounded hover:bg-slate-100 text-slate-600" title="Menu">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-file-pdf text-red-500 text-xl"></i>
                    <h1 class="text-lg font-semibold text-slate-700 hidden sm:block">PdfEditor</h1>
                </div>
            </div>
            <div class="flex items-center gap-2 text-sm text-slate-500">
                <span id="fileStatus" class="hidden sm:inline">Nessun file caricato</span>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <div class="flex flex-1 overflow-hidden">
            <!-- SIDEBAR -->
            <aside id="sidebar" class="sidebar-transition w-72 bg-white border-r border-slate-200 flex flex-col shrink-0
                        max-lg:fixed max-lg:left-0 max-lg:top-0 max-lg:h-full max-lg:z-40 max-lg:-translate-x-full">
                <div class="lg:hidden flex items-center justify-between p-3 border-b border-slate-200">
                    <span class="font-medium text-slate-700">File PDF</span>
                    <button id="sidebarClose" class="p-1 rounded hover:bg-slate-100 text-slate-500">
                        <i class="fa-solid fa-times"></i>
                    </button>
                </div>

                <!-- Upload area -->
                <div class="p-3 border-b border-slate-200">
                    <label class="flex flex-col items-center justify-center gap-1 border-2 border-dashed border-slate-300 rounded-lg p-4 cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition text-slate-500">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                        <span class="text-sm font-medium">Carica PDF</span>
                        <span class="text-xs">massimo 50 MB</span>
                        <input type="file" id="fileInput" accept=".pdf" class="hidden" />
                    </label>
                </div>

                <div class="flex-1 overflow-y-auto custom-scroll p-2" id="pdfList">
                    <p class="text-sm text-slate-400 text-center py-8">
                        <i class="fa-regular fa-file-lines text-3xl block mb-2"></i>
                        Nessun PDF caricato
                    </p>
                </div>
            </aside>

            <!-- Overlay mobile -->
            <div id="sidebarOverlay" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // PDF EDITOR — PROTOTIPO CLIENT-SIDE
        // ============================================================

        (function() {
            'use strict';

            // ---- Costanti ----
            const MAX_FILE_SIZE = 50 * 1024 * 1024; // 50 MB

            // ---- Stato ----
            let pdfFiles = [];       // { id, name, size, date, data }
            let activePdfId = null;
            let fileIdCounter = 0;

            // ---- Utility ----
            function formatSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }

            function sanitizeName(name) {
                return name.replace(/\.pdf$/i, '');
            }

            // ---- Upload file ----
            const fileInput = document.getElementById('fileInput');
            fileInput.addEventListener('change', function(e) {
                const files = e.target.files;
                if (!files.length) return;

                for (const file of files) {
                    if (file.type !== 'application/pdf') {
                        alert('Solo file PDF sono supportati.');
                        continue;
                    }
                    if (file.size > MAX_FILE_SIZE) {
                        alert('Il file "' + file.name + '" supera il limite di 50 MB.');
                        continue;
                    }

                    const reader = new FileReader();
                    const fileId = ++fileIdCounter;
                    reader.onload = function(ev) {
                        pdfFiles.push({
                            id: fileId,
                            name: file.name,
                            size: file.size,
                            date: Date.now(),
                            data: ev.target.result,
                        });
                        renderFileList();
                        if (!activePdfId || pdfFiles.length === 1) {
                            loadPdfFromFile(fileId);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                }
                fileInput.value = '';
            });

            // ---- Render lista PDF ----
            const pdfList = document.getElementById('pdfList');

            function renderFileList() {
                if (!pdfFiles.length) {
                    pdfList.innerHTML = `
                        <p class="text-sm text-slate-400 text-center py-8">
                            <i class="fa-regular fa-file-lines text-3xl block mb-2"></i>
                            Nessun PDF caricato
                        </p>
                    `;
                    return;
                }
                let html = '<ul class="space-y-1">';
                const sorted = [...pdfFiles].sort((a, b) => b.date - a.date);
                for (const f of sorted) {
                    const active = f.id === activePdfId;
                    html += `
                        <li class="flex items-center gap-2 p-2 rounded-lg cursor-pointer hover:bg-slate-100 transition ${active ? 'bg-blue-50 ring-1 ring-blue-200' : ''}"
                            data-id="${f.id}">
                            <i class="fa-solid fa-file-pdf text-red-400 shrink-0"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-slate-700 truncate">${f.name}</p>
                                <p class="text-xs text-slate-400">${formatSize(f.size)}</p>
                            </div>
                            <div class="flex gap-0.5 shrink-0">
                                <button class="rename-btn p-1.5 rounded hover:bg-blue-100 text-slate-500 hover:text-blue-600" data-id="${f.id}" title="Rinomina">
                                    <i class="fa-solid fa-pencil text-xs"></i>
                                </button>
                                <button class="delete-btn p-1.5 rounded hover:bg-red-100 text-slate-500 hover:text-red-600" data-id="${f.id}" title="Elimina">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </button>
                            </div>
                        </li>
                    `;
                }
                html += '</ul>';
                pdfList.innerHTML = html;

                pdfList.querySelectorAll('li[data-id]').forEach(li => {
                    li.addEventListener('click', function(e) {
                        if (e.target.closest('.rename-btn') || e.target.closest('.delete-btn')) return;
                        loadPdfFromFile(parseInt(this.dataset.id));
                    });
                });
            }

            console.log('PdfEditor — JS upload pronto');
        })();
    </script>

</body>
</html>
