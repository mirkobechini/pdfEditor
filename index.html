<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PdfEditor</title>

    <!-- TailwindCSS via CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- PDF.js (Mozilla) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.js">
    </script>
    <!-- Font Awesome 6 (icone) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <style>
        /* Full-height layout */
        html, body {
            height: 100%;
            overflow: hidden;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        /* Sidebar mobile transition */
        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }
        /* Tooltip */
        [title] {
            position: relative;
        }
        [title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <div id="app">
        <!-- TOP BAR -->
        <header class="bg-white border-b border-slate-200 px-4 py-2 flex items-center justify-between shrink-0 shadow-sm">
            <div class="flex items-center gap-3">
                <button id="menuToggle" class="lg:hidden p-1.5 rounded hover:bg-slate-100 text-slate-600" title="Menu">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-file-pdf text-red-500 text-xl"></i>
                    <h1 class="text-lg font-semibold text-slate-700 hidden sm:block">PdfEditor</h1>
                </div>
            </div>
            <div class="flex items-center gap-2 text-sm text-slate-500">
                <span id="fileStatus" class="hidden sm:inline">Nessun file caricato</span>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <div class="flex flex-1 overflow-hidden">
            <!-- SIDEBAR -->
            <aside id="sidebar" class="sidebar-transition w-72 bg-white border-r border-slate-200 flex flex-col shrink-0
                        max-lg:fixed max-lg:left-0 max-lg:top-0 max-lg:h-full max-lg:z-40 max-lg:-translate-x-full">
                <div class="lg:hidden flex items-center justify-between p-3 border-b border-slate-200">
                    <span class="font-medium text-slate-700">File PDF</span>
                    <button id="sidebarClose" class="p-1 rounded hover:bg-slate-100 text-slate-500">
                        <i class="fa-solid fa-times"></i>
                    </button>
                </div>

                <!-- Upload area -->
                <div class="p-3 border-b border-slate-200">
                    <label class="flex flex-col items-center justify-center gap-1 border-2 border-dashed border-slate-300 rounded-lg p-4 cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition text-slate-500">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                        <span class="text-sm font-medium">Carica PDF</span>
                        <span class="text-xs">massimo 50 MB</span>
                        <input type="file" id="fileInput" accept=".pdf" class="hidden" />
                    </label>
                </div>

                <div class="flex-1 overflow-y-auto custom-scroll p-2" id="pdfList">
                    <p class="text-sm text-slate-400 text-center py-8">
                        <i class="fa-regular fa-file-lines text-3xl block mb-2"></i>
                        Nessun PDF caricato
                    </p>
                </div>
            </aside>

            <!-- Overlay mobile -->
            <div id="sidebarOverlay" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden"></div>

            <!-- WORKSPACE -->
            <main class="flex-1 flex flex-col overflow-hidden">
                <!-- TOOLBAR -->
                <div class="bg-white border-b border-slate-200 px-3 py-1.5 flex items-center gap-1 shrink-0 overflow-x-auto custom-scroll">
                    <!-- Navigazione pagine -->
                    <div class="flex items-center gap-1 mr-2">
                        <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600 disabled:opacity-30 disabled:cursor-not-allowed" id="firstPage" title="Prima pagina">
                            <i class="fa-solid fa-angles-left text-xs"></i>
                        </button>
                        <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600 disabled:opacity-30 disabled:cursor-not-allowed" id="prevPage" title="Pagina precedente">
                            <i class="fa-solid fa-chevron-left text-xs"></i>
                        </button>
                        <span class="text-sm text-slate-600 mx-1 whitespace-nowrap">
                            <input type="number" id="pageInput" value="1" min="1" class="w-10 text-center border border-slate-300 rounded text-sm py-0.5" />
                            <span id="pageCount">/ 0</span>
                        </span>
                        <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600 disabled:opacity-30 disabled:cursor-not-allowed" id="nextPage" title="Pagina successiva">
                            <i class="fa-solid fa-chevron-right text-xs"></i>
                        </button>
                        <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600 disabled:opacity-30 disabled:cursor-not-allowed" id="lastPage" title="Ultima pagina">
                            <i class="fa-solid fa-angles-right text-xs"></i>
                        </button>
                    </div>

                    <div class="w-px h-6 bg-slate-200 mx-1"></div>

                    <!-- Zoom -->
                    <div class="flex items-center gap-1 mr-2">
                        <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600" id="zoomOut" title="Zoom -">
                            <i class="fa-solid fa-minus text-xs"></i>
                        </button>
                        <span class="text-sm text-slate-600 w-12 text-center" id="zoomLevel">100%</span>
                        <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600" id="zoomIn" title="Zoom +">
                            <i class="fa-solid fa-plus text-xs"></i>
                        </button>
                        <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600 ml-1" id="fitWidth" title="Adatta alla larghezza">
                            <i class="fa-solid fa-expand text-xs"></i>
                        </button>
                    </div>

                    <div class="w-px h-6 bg-slate-200 mx-1"></div>

                    <!-- Strumenti -->
                    <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600 disabled:opacity-30" id="annotateBtn" disabled title="Annota PDF">
                        <i class="fa-solid fa-highlighter text-sm"></i>
                    </button>
                    <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600 disabled:opacity-30" id="editBtn" disabled title="Modifica PDF">
                        <i class="fa-solid fa-pen text-sm"></i>
                    </button>
                    <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600 disabled:opacity-30" id="convertBtn" disabled title="Converti PDF">
                        <i class="fa-solid fa-file-export text-sm"></i>
                    </button>
                    <button class="p-1.5 rounded hover:bg-slate-100 text-slate-600 disabled:opacity-30" id="downloadBtn" disabled title="Scarica">
                        <i class="fa-solid fa-download text-sm"></i>
                    </button>
                </div>

                <!-- VIEWER AREA -->
                <div class="flex-1 bg-slate-200 overflow-auto custom-scroll relative" id="workspace">
                    <div class="min-h-full flex items-center justify-center p-4" id="viewerContainer">
                        <div class="text-center text-slate-400">
                            <i class="fa-regular fa-file-pdf text-6xl block mb-4"></i>
                            <p class="text-lg">Carica un PDF per iniziare</p>
                            <p class="text-sm mt-1">Usa il menu laterale per caricare un file</p>
                        </div>
                        <canvas id="pdfCanvas" class="hidden shadow-xl bg-white"></canvas>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- MODAL RINOMINA -->
    <div id="renameModal" class="fixed inset-0 bg-black/40 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden">
            <div class="flex items-center justify-between px-5 py-3 border-b border-slate-200">
                <h3 class="font-semibold text-slate-700">Rinomina file</h3>
                <button id="closeRenameModal" class="p-1 hover:bg-slate-100 rounded text-slate-500">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="p-5 space-y-3">
                <input type="text" id="renameInput" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none" />
                <button id="renameConfirm" class="w-full bg-blue-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-blue-700 transition">
                    Rinomina
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL CONVERSIONE -->
    <div id="convertModal" class="fixed inset-0 bg-black/40 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="flex items-center justify-between px-5 py-3 border-b border-slate-200">
                <h3 class="font-semibold text-slate-700">Converti PDF</h3>
                <button id="closeConvertModal" class="p-1 hover:bg-slate-100 rounded text-slate-500">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="p-5 space-y-3">
                <p class="text-sm text-slate-600">Scegli il formato di destinazione:</p>
                <div class="grid grid-cols-2 gap-3">
                    <button class="flex flex-col items-center gap-2 p-4 border-2 border-slate-200 rounded-xl hover:border-blue-400 hover:bg-blue-50 transition" data-format="docx">
                        <i class="fa-regular fa-file-word text-3xl text-blue-600"></i>
                        <span class="text-sm font-medium">Word (DOCX)</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-4 border-2 border-slate-200 rounded-xl hover:border-green-400 hover:bg-green-50 transition" data-format="xlsx">
                        <i class="fa-regular fa-file-excel text-3xl text-green-600"></i>
                        <span class="text-sm font-medium">Excel (XLSX)</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-4 border-2 border-slate-200 rounded-xl hover:border-purple-400 hover:bg-purple-50 transition" data-format="png">
                        <i class="fa-regular fa-file-image text-3xl text-purple-600"></i>
                        <span class="text-sm font-medium">Immagini (PNG)</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 p-4 border-2 border-slate-200 rounded-xl hover:border-yellow-400 hover:bg-yellow-50 transition" data-format="jpg">
                        <i class="fa-regular fa-file-image text-3xl text-yellow-600"></i>
                        <span class="text-sm font-medium">Immagini (JPG)</span>
                    </button>
                </div>
                <p id="convertStatus" class="text-sm text-slate-500 text-center hidden">
                    <i class="fa-solid fa-spinner fa-spin mr-1"></i> Conversione in corso...
                </p>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // PDF EDITOR — PROTOTIPO CLIENT-SIDE
        // ============================================================

        (function() {
            'use strict';

            // ---- Costanti ----
            const MAX_FILE_SIZE = 50 * 1024 * 1024; // 50 MB

            // ---- Stato ----
            let pdfFiles = [];       // { id, name, size, date, data }
            let activePdfId = null;
            let fileIdCounter = 0;

            // ---- Utility ----
            function formatSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }

            function sanitizeName(name) {
                return name.replace(/\.pdf$/i, '');
            }

            // ---- Upload file ----
            const fileInput = document.getElementById('fileInput');
            fileInput.addEventListener('change', function(e) {
                const files = e.target.files;
                if (!files.length) return;

                for (const file of files) {
                    if (file.type !== 'application/pdf') {
                        alert('Solo file PDF sono supportati.');
                        continue;
                    }
                    if (file.size > MAX_FILE_SIZE) {
                        alert('Il file "' + file.name + '" supera il limite di 50 MB.');
                        continue;
                    }

                    const reader = new FileReader();
                    const fileId = ++fileIdCounter;
                    reader.onload = function(ev) {
                        pdfFiles.push({
                            id: fileId,
                            name: file.name,
                            size: file.size,
                            date: Date.now(),
                            data: ev.target.result,
                        });
                        renderFileList();
                        if (!activePdfId || pdfFiles.length === 1) {
                            loadPdfFromFile(fileId);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                }
                fileInput.value = '';
            });

            // ---- Render lista PDF ----
            const pdfList = document.getElementById('pdfList');

            function renderFileList() {
                if (!pdfFiles.length) {
                    pdfList.innerHTML = `
                        <p class="text-sm text-slate-400 text-center py-8">
                            <i class="fa-regular fa-file-lines text-3xl block mb-2"></i>
                            Nessun PDF caricato
                        </p>
                    `;
                    return;
                }
                let html = '<ul class="space-y-1">';
                const sorted = [...pdfFiles].sort((a, b) => b.date - a.date);
                for (const f of sorted) {
                    const active = f.id === activePdfId;
                    html += `
                        <li class="flex items-center gap-2 p-2 rounded-lg cursor-pointer hover:bg-slate-100 transition ${active ? 'bg-blue-50 ring-1 ring-blue-200' : ''}"
                            data-id="${f.id}">
                            <i class="fa-solid fa-file-pdf text-red-400 shrink-0"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-slate-700 truncate">${f.name}</p>
                                <p class="text-xs text-slate-400">${formatSize(f.size)}</p>
                            </div>
                            <div class="flex gap-0.5 shrink-0">
                                <button class="rename-btn p-1.5 rounded hover:bg-blue-100 text-slate-500 hover:text-blue-600" data-id="${f.id}" title="Rinomina">
                                    <i class="fa-solid fa-pencil text-xs"></i>
                                </button>
                                <button class="delete-btn p-1.5 rounded hover:bg-red-100 text-slate-500 hover:text-red-600" data-id="${f.id}" title="Elimina">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </button>
                            </div>
                        </li>
                    `;
                }
                html += '</ul>';
                pdfList.innerHTML = html;

                pdfList.querySelectorAll('li[data-id]').forEach(li => {
                    li.addEventListener('click', function(e) {
                        if (e.target.closest('.rename-btn') || e.target.closest('.delete-btn')) return;
                        loadPdfFromFile(parseInt(this.dataset.id));
                    });
                });

                // Delega eventi rename
                pdfList.querySelectorAll('.rename-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = parseInt(this.dataset.id);
                        const file = pdfFiles.find(f => f.id === id);
                        if (file) {
                            renameInput.value = sanitizeName(file.name);
                            renameModal.classList.remove('hidden');
                            renameModal.classList.add('flex');
                            renameInput.focus();
                            renameInput.select();
                        }
                    });
                });
            }

            // ---- Rinomina ----
            const renameModal = document.getElementById('renameModal');
            const renameInput = document.getElementById('renameInput');
            document.getElementById('closeRenameModal').addEventListener('click', function() {
                renameModal.classList.add('hidden');
                renameModal.classList.remove('flex');
            });
            renameModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    renameModal.classList.add('hidden');
                    renameModal.classList.remove('flex');
                }
            });
            renameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') document.getElementById('renameConfirm').click();
                if (e.key === 'Escape') document.getElementById('closeRenameModal').click();
            });
            document.getElementById('renameConfirm').addEventListener('click', function() {
                const newName = renameInput.value.trim();
                if (!newName) {
                    alert('Il nome non può essere vuoto.');
                    return;
                }
                const file = pdfFiles.find(f => f.id === activePdfId);
                if (file) {
                    file.name = newName.endsWith('.pdf') ? newName : newName + '.pdf';
                    renderFileList();
                    if (activePdfId === file.id) {
                        document.getElementById('fileStatus').textContent = file.name;
                    }
                }
                renameModal.classList.add('hidden');
                renameModal.classList.remove('flex');
            });

            // ---- Elimina file ----
            pdfList.addEventListener('click', function(e) {
                const btn = e.target.closest('.delete-btn');
                if (!btn) return;
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                if (!confirm('Eliminare questo file PDF?')) return;
                const idx = pdfFiles.findIndex(f => f.id === id);
                if (idx === -1) return;
                pdfFiles.splice(idx, 1);
                if (activePdfId === id) {
                    activePdfId = null;
                    const fileStatus = document.getElementById('fileStatus');
                    fileStatus.textContent = 'Nessun file caricato';
                }
                renderFileList();
            });

            // ---- Carica PDF da file salvato ----
            function loadPdfFromFile(id) {
                const file = pdfFiles.find(f => f.id === id);
                if (!file) return;
                activePdfId = id;
                renderFileList();
                document.getElementById('fileStatus').textContent = file.name;
                loadPdfInViewer(file.data);
            }

            // ---- Sidebar toggle (mobile) ----
            function toggleSidebar(open) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebarOverlay');
                if (open) {
                    sidebar.classList.remove('max-lg:-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('max-lg:-translate-x-full');
                    overlay.classList.add('hidden');
                }
            }
            document.getElementById('menuToggle').addEventListener('click', function() { toggleSidebar(true); });
            document.getElementById('sidebarClose').addEventListener('click', function() { toggleSidebar(false); });
            document.getElementById('sidebarOverlay').addEventListener('click', function() { toggleSidebar(false); });

            // ---- PDF.js ----
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.js';

            let pdfDoc = null;
            let currentPage = 1;
            let currentScale = 1.0;

            const canvas = document.getElementById('pdfCanvas');
            const ctx = canvas.getContext('2d');
            const viewerContainer = document.getElementById('viewerContainer');
            const welcomePlaceholder = viewerContainer.querySelector('div:first-child');

            // ---- Render pagina ----
            function renderPage() {
                if (!pdfDoc) return;
                const pageNum = Math.min(Math.max(1, currentPage), pdfDoc.numPages);
                currentPage = pageNum;
                document.getElementById('pageInput').value = pageNum;

                pdfDoc.getPage(pageNum).then(function(page) {
                    const viewport = page.getViewport({ scale: currentScale });
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    canvas.classList.remove('hidden');
                    if (welcomePlaceholder) welcomePlaceholder.classList.add('hidden');

                    return page.render({
                        canvasContext: ctx,
                        viewport: viewport,
                    }).promise;
                }).then(function() {
                    const ws = document.getElementById('workspace');
                    ws.scrollTop = 0;
                    ws.scrollLeft = 0;
                }).catch(function(err) {
                    console.error('Errore rendering pagina:', err);
                });
            }

            // ---- Carica PDF con PDF.js ----
            function loadPdfInViewer(arrayBuffer) {
                const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer.slice(0) });
                loadingTask.promise.then(function(doc) {
                    pdfDoc = doc;
                    currentPage = 1;
                    currentScale = 1.0;
                    document.getElementById('pageInput').value = 1;
                    document.getElementById('pageCount').textContent = '/ ' + doc.numPages;
                    document.getElementById('pageInput').max = doc.numPages;
                    updateButtons();
                    renderPage();
                }).catch(function(err) {
                    console.error('Errore caricamento PDF:', err);
                    alert('Impossibile leggere il file PDF. Potrebbe essere danneggiato.');
                });
            }

            // ---- Stato pulsanti ----
            function updateButtons() {
                const disabled = !pdfDoc;
                document.getElementById('firstPage').disabled = disabled;
                document.getElementById('prevPage').disabled = disabled;
                document.getElementById('nextPage').disabled = disabled;
                document.getElementById('lastPage').disabled = disabled;
                document.getElementById('pageInput').disabled = disabled;
                document.getElementById('annotateBtn').disabled = disabled;
                document.getElementById('editBtn').disabled = disabled;
                document.getElementById('convertBtn').disabled = disabled;
                document.getElementById('downloadBtn').disabled = disabled;
            }

            // ---- Navigazione bottoni ----
            document.getElementById('firstPage').addEventListener('click', function() {
                if (!pdfDoc) return;
                currentPage = 1;
                renderPage();
            });
            document.getElementById('prevPage').addEventListener('click', function() {
                if (!pdfDoc || currentPage <= 1) return;
                currentPage--;
                renderPage();
            });
            document.getElementById('nextPage').addEventListener('click', function() {
                if (!pdfDoc || currentPage >= pdfDoc.numPages) return;
                currentPage++;
                renderPage();
            });
            document.getElementById('lastPage').addEventListener('click', function() {
                if (!pdfDoc) return;
                currentPage = pdfDoc.numPages;
                renderPage();
            });
            document.getElementById('pageInput').addEventListener('change', function() {
                if (!pdfDoc) return;
                const p = parseInt(this.value);
                if (p >= 1 && p <= pdfDoc.numPages) {
                    currentPage = p;
                    renderPage();
                } else {
                    this.value = currentPage;
                }
            });

            // ---- Navigazione tastiera ----
            document.addEventListener('keydown', function(e) {
                if (!pdfDoc) return;
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                    e.preventDefault();
                    if (currentPage > 1) { currentPage--; renderPage(); }
                } else if (e.key === 'ArrowRight' || e.key === 'PageDown') {
                    e.preventDefault();
                    if (currentPage < pdfDoc.numPages) { currentPage++; renderPage(); }
                }
            });

            // ---- Zoom ----
            const SCALE_STEP = 0.25;
            const MIN_SCALE = 0.5;
            const MAX_SCALE = 3.0;
            const zoomLevel = document.getElementById('zoomLevel');

            document.getElementById('zoomIn').addEventListener('click', function() {
                currentScale = Math.min(MAX_SCALE, currentScale + SCALE_STEP);
                zoomLevel.textContent = Math.round(currentScale * 100) + '%';
                if (pdfDoc) renderPage();
            });
            document.getElementById('zoomOut').addEventListener('click', function() {
                currentScale = Math.max(MIN_SCALE, currentScale - SCALE_STEP);
                zoomLevel.textContent = Math.round(currentScale * 100) + '%';
                if (pdfDoc) renderPage();
            });
            document.getElementById('fitWidth').addEventListener('click', function() {
                if (!pdfDoc) return;
                const ws = document.getElementById('workspace');
                const containerWidth = ws.clientWidth - 32;
                pdfDoc.getPage(currentPage).then(function(page) {
                    const viewport = page.getViewport({ scale: 1.0 });
                    currentScale = containerWidth / viewport.width;
                    currentScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, currentScale));
                    zoomLevel.textContent = Math.round(currentScale * 100) + '%';
                    renderPage();
                });
            });

            // ---- Download ----
            document.getElementById('downloadBtn').addEventListener('click', function() {
                if (!pdfDoc || !activePdfId) return;
                const file = pdfFiles.find(f => f.id === activePdfId);
                if (!file) return;
                const blob = new Blob([file.data], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = file.name;
                a.click();
                URL.revokeObjectURL(url);
            });

            // ---- Modale conversione ----
            const convertModal = document.getElementById('convertModal');
            document.getElementById('convertBtn').addEventListener('click', function() {
                if (!pdfDoc || !activePdfId) return;
                convertModal.classList.remove('hidden');
                convertModal.classList.add('flex');
                document.getElementById('convertStatus').classList.add('hidden');
            });
            document.getElementById('closeConvertModal').addEventListener('click', function() {
                convertModal.classList.add('hidden');
                convertModal.classList.remove('flex');
            });
            convertModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    convertModal.classList.add('hidden');
                    convertModal.classList.remove('flex');
                }
            });
            convertModal.querySelectorAll('[data-format]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const format = this.dataset.format;
                    document.getElementById('convertStatus').classList.remove('hidden');
                    setTimeout(function() {
                        document.getElementById('convertStatus').classList.add('hidden');
                        convertModal.classList.add('hidden');
                        convertModal.classList.remove('flex');
                        alert(
                            `Conversione in ${format.toUpperCase()} simulata.\n\n` +
                            `Nella versione completa, il file verrà convertito ` +
                            `e scaricato in formato ${format.toUpperCase()}.\n\n` +
                            `Questa funzionalità richiede il backend (Laravel).`
                        );
                    }, 1200);
                });
            });

            console.log('PdfEditor — Prototipo completo');
        })();
    </script>

</body>
</html>
