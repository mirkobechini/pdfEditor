<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PdfEditor</title>

    <!-- TailwindCSS via CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <!-- PDF.js (Mozilla) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.js">
    </script>
    <!-- Font Awesome 6 (icone) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <style>
        /* Full-height layout */
        html, body {
            height: 100%;
            overflow: hidden;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        /* Sidebar mobile transition */
        .sidebar-transition {
            transition: transform 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <div id="app">
        <!-- TOP BAR -->
        <header class="bg-white border-b border-slate-200 px-4 py-2 flex items-center justify-between shrink-0 shadow-sm">
            <div class="flex items-center gap-3">
                <button id="menuToggle" class="lg:hidden p-1.5 rounded hover:bg-slate-100 text-slate-600" title="Menu">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-file-pdf text-red-500 text-xl"></i>
                    <h1 class="text-lg font-semibold text-slate-700 hidden sm:block">PdfEditor</h1>
                </div>
            </div>
            <div class="flex items-center gap-2 text-sm text-slate-500">
                <span id="fileStatus" class="hidden sm:inline">Nessun file caricato</span>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <div class="flex flex-1 overflow-hidden">
            <!-- SIDEBAR -->
            <aside id="sidebar" class="sidebar-transition w-72 bg-white border-r border-slate-200 flex flex-col shrink-0
                        max-lg:fixed max-lg:left-0 max-lg:top-0 max-lg:h-full max-lg:z-40 max-lg:-translate-x-full">
                <div class="lg:hidden flex items-center justify-between p-3 border-b border-slate-200">
                    <span class="font-medium text-slate-700">File PDF</span>
                    <button id="sidebarClose" class="p-1 rounded hover:bg-slate-100 text-slate-500">
                        <i class="fa-solid fa-times"></i>
                    </button>
                </div>

                <!-- Upload area -->
                <div class="p-3 border-b border-slate-200">
                    <label class="flex flex-col items-center justify-center gap-1 border-2 border-dashed border-slate-300 rounded-lg p-4 cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition text-slate-500">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                        <span class="text-sm font-medium">Carica PDF</span>
                        <span class="text-xs">massimo 50 MB</span>
                        <input type="file" id="fileInput" accept=".pdf" class="hidden" />
                    </label>
                </div>

                <div class="flex-1 p-4 text-sm text-slate-400 text-center">
                    <p>Sidebar — in fase di sviluppo</p>
                </div>
            </aside>

            <!-- Overlay mobile -->
            <div id="sidebarOverlay" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden"></div>
        </div>
    </div>

    <script>
        console.log('PdfEditor — Pronto');
    </script>

</body>
</html>
