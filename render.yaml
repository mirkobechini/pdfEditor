services:
  - type: web
    name: pdeditor-backend
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install --no-build-isolation -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false # Imposta manualmente con la connection string di Neon
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_BUCKET
        sync: false # Imposta manualmente con il nome del bucket R2
      - key: S3_ENDPOINT
        sync: false # Imposta manualmente (es. https://<accountid>.r2.cloudflarestorage.com)
      - key: S3_ACCESS_KEY
        sync: false # Imposta manualmente (R2 API token)
      - key: S3_SECRET_KEY
        sync: false # Imposta manualmente (R2 API token secret)
      - key: S3_REGION
        value: auto

  - type: static_site
    name: pdeditor-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: out
    envVars:
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
